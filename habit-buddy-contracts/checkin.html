<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proof Check-in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Proof Check-in</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="contract.html">Create Contract</a>
            <a href="leaderboard.html">Streak Leaderboard</a>
            <a href="milestones.html">Reward Milestones</a>
        </nav>
    </header>
    <main>
        <section>
            <form id="checkinForm">
                <label>Contract Goal: <input type="text" name="goal" required></label><br>
                <label>Proof (text):<br>
                    <textarea name="proof" rows="3" required></textarea>
                </label><br>
                <label>Proof (photo): <input type="file" name="photo" accept="image/*"></label><br>
                <button type="submit">Submit Check-in</button>
            </form>
            <div id="checkinList"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Habit Buddy Contracts</p>
    </footer>
    <script src="checkin.js"></script>
</body>
</html>
