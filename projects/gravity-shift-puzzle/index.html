<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gravity Shift Puzzle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🪐 Gravity Shift Puzzle</h1>

<div class="hud">
Moves: <span id="moves">0</span>
<button id="reset">Reset</button>
</div>

<div id="game">

<div id="player"></div>
<div class="goal"></div>

<div class="block" style="top:120px; left:160px"></div>
<div class="block" style="top:200px; left:80px"></div>

</div>

<div class="controls">
<button onclick="setGravity('up')">⬆</button>
<button onclick="setGravity('left')">⬅</button>
<button onclick="setGravity('down')">⬇</button>
<button onclick="setGravity('right')">➡</button>
</div>

<p class="hint">Shift gravity to slide the cube into the portal!</p>

<script src="script.js"></script>
</body>
</html>
