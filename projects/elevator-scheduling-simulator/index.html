<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elevator Scheduling Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🛗 Elevator Scheduling Simulator</h1>

<div class="panel">

<div class="floors" id="floors"></div>

<div class="elevator-shaft">
<div class="elevator" id="elevator">E</div>
</div>

</div>

<div class="status">
Floor: <span id="currentFloor">1</span> |
Direction: <span id="direction">Idle</span>
</div>

<div class="queue">
Queue: <span id="queue"></span>
</div>

<script src="script.js"></script>
</body>
</html>
