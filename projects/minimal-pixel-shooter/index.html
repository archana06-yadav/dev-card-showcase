<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minimal Pixel Shooter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚡ Minimal Pixel Shooter</h1>

<div class="hud">

</div>

<canvas id="game" width="500" height="400"></canvas>

</p>

<script src="script.js"></script>

</body>
</html>
