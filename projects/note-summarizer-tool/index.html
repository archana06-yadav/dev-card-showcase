<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Note Summarizer Tool</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧠 Note Summarizer Tool</h1>

<div class="container">

<textarea id="inputText" placeholder="Paste your notes here..."></textarea>

<div class="controls">

<select id="mode">
<option value="short">Short Summary</option>
<option value="medium">Medium Summary</option>
<option value="long">Detailed Summary</option>
</select>

<button id="summarize">Summarize</button>
<button id="copy">Copy Summary</button>

</div>

<div class="info">
<span id="readingTime"></span>
<span id="keywords"></span>
</div>

<textarea id="summary" placeholder="Summary will appear here..." readonly></textarea>

</div>

<script src="script.js"></script>

</body>
</html>
