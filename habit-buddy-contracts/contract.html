<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Habit Contract</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Create Habit Contract</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="checkin.html">Proof Check-in</a>
            <a href="leaderboard.html">Streak Leaderboard</a>
            <a href="milestones.html">Reward Milestones</a>
        </nav>
    </header>
    <main>
        <section>
            <form id="contractForm">
                <label>Goal: <input type="text" name="goal" required></label><br>
                <label>Buddy Name: <input type="text" name="buddy" required></label><br>
                <label>Duration:
                    <select name="duration" required>
                        <option value="7">7 days</option>
                        <option value="14">14 days</option>
                        <option value="30">30 days</option>
                    </select>
                </label><br>
                <button type="submit">Create Contract</button>
            </form>
            <div id="contractList"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Habit Buddy Contracts</p>
    </footer>
    <script src="contract.js"></script>
</body>
</html>
