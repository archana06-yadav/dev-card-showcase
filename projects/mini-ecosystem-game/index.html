<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Ecosystem Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🌿 Mini Ecosystem</h1>

<div class="panel">

Plants: <span id="plantCount">0</span> |
Herbivores: <span id="herbCount">0</span> |
Predators: <span id="predCount">0</span>

<button onclick="addHerbivore()">Add Herbivore</button>
<button onclick="addPredator()">Add Predator</button>

</div>

<canvas id="game" width="500" height="400"></canvas>

<p class="hint">
Maintain balance: too many predators will collapse the ecosystem!
</p>

<script src="script.js"></script>

</body>
</html>
