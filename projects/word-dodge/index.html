<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word Dodge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚡ Word Dodge</h1>

<div class="hud">
Score: <span id="score">0</span>
<button id="restart">Restart</button>
</div>

<div id="game"></div>

<input id="typing" placeholder="Type words to destroy them...">

<p class="hint">
Move with A / D keys and type falling words before they hit you.
</p>

<script src="script.js"></script>

</body>
</html>
