<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Traffic Light Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚦 Traffic Light Simulator</h1>

<div class="controls">
<button id="auto">Auto Mode</button>
<button id="redBtn">Red</button>
<button id="yellowBtn">Yellow</button>
<button id="greenBtn">Green</button>
<button id="pedestrian">Pedestrian Crossing</button>
</div>

<div class="timer">
Next Change In: <span id="count">5</span>s
</div>

<div class="traffic-light">
<div class="light red"></div>
<div class="light yellow"></div>
<div class="light green"></div>
</div>

<script src="script.js"></script>

</body>
</html>
